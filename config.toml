[policy]
reset_threshold_minutes = 60   # run if weekly (7d) window resets within this many minutes
idle_threshold_minutes  = 10   # only run after this much observed inactivity
max_tasks_per_run       = 3    # tasks to run back-to-back per cron invocation (1 = old behaviour)

[providers.claude]
binary        = "claude"
refresh_model = "claude-haiku-4-5-20251001"  # model used for API rate-limit ping (cheapest)
default_model = ""                           # task default — empty = claude's own default (sonnet)
activity_epsilon_pct = 0.1                   # ignore smaller used-% moves when estimating idle

[providers.codex]
binary         = "codex"
sessions_dir   = "~/.codex/sessions"
refresh_model  = "gpt-5.4-mini"              # probe model — cheapest available Codex model
default_model  = ""                          # task default — empty = codex's own default (gpt-5.4)
activity_epsilon_pct = 0.1                   # ignore smaller used-% moves when estimating idle

[paths]
log = "~/.quota-burn/run.log"
